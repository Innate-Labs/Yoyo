<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Yoyo · 异宠 AI 养护助手</title>
  <style>
    :root{--cream:#fffaf0;--cream2:#f7efdf;--milk:#fffef9;--ink:#29211c;--muted:#7e6e61;--honey:#f4b544;--butter:#ffdda1;--peach:#ffbe9f;--mint:#dcecc9;--sky:#c8e4ef;--blue:#4f9fc1;--red:#e86d63;--line:rgba(41,33,28,.18);--shadow:6px 6px 0 var(--ink)}
    *{box-sizing:border-box}html,body{height:100%;margin:0}body{font-family:Inter,-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;color:var(--ink);background:var(--cream);-webkit-font-smoothing:antialiased}button,input,textarea{font:inherit}button{cursor:pointer}.display{font-family:"Arial Rounded MT Bold","Arial Black","PingFang SC",sans-serif;font-weight:900;letter-spacing:-.045em}.screen{display:none}.screen.active{display:block}.hidden{display:none!important}
    .btn{padding:9px 15px;border:1.5px solid var(--ink);border-radius:999px;font-size:13px;font-weight:850;transition:.18s}.btn:hover{transform:translateY(-2px)}.btn-primary{background:var(--honey);box-shadow:3px 3px 0 var(--ink)}.btn-light{background:rgba(255,250,240,.88);backdrop-filter:blur(12px)}

    /* 视频落地页 */
    .video-home{height:100svh;min-height:650px;position:relative;overflow:hidden;background:var(--ink)}
    .hero-video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}.video-home:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(41,33,28,.16),transparent 34%,transparent 62%,rgba(41,33,28,.45));pointer-events:none}
    .topbar{position:relative;z-index:4;height:88px;padding:0 30px;display:flex;align-items:center;justify-content:space-between}.brand{display:flex;align-items:center;gap:9px;padding:7px 12px 7px 8px;border:1.5px solid var(--ink);border-radius:999px;background:rgba(255,250,240,.86);backdrop-filter:blur(14px);box-shadow:3px 3px 0 var(--ink);font-size:20px}.brand-mark{width:33px;height:33px;border:1.5px solid var(--ink);border-radius:50%;background:var(--honey);display:grid;place-items:center}.top-actions{display:flex;gap:8px}
    .arc-title{position:absolute;z-index:3;top:18px;left:50%;transform:translateX(-50%);width:min(920px,80vw);height:280px;overflow:visible;pointer-events:none;filter:drop-shadow(0 3px 0 rgba(255,250,240,.5))}.arc-title text{fill:#111;font-family:"Arial Rounded MT Bold","Arial Black",sans-serif;font-size:108px;font-weight:900;letter-spacing:-5px}
    .bottom{position:absolute;z-index:4;left:30px;right:30px;bottom:25px;display:flex;align-items:end;justify-content:space-between}.status-card{display:flex;align-items:center;gap:11px;padding:10px 13px;border:1.5px solid var(--ink);border-radius:16px;background:rgba(255,250,240,.88);backdrop-filter:blur(14px);box-shadow:4px 4px 0 var(--ink)}.status-dot{width:9px;height:9px;border-radius:50%;background:#79c58f;box-shadow:0 0 0 5px rgba(121,197,143,.18)}.status-card b{display:block;font-size:13px}.status-card small{display:block;margin-top:3px;color:var(--muted);font-size:10px}.video-toggle{width:42px;height:42px;border:1.5px solid var(--ink);border-radius:50%;background:var(--sky);font-size:13px;font-weight:900}

    /* 通用弹窗 */
    .mask{position:fixed;z-index:100;inset:0;padding:18px;display:grid;place-items:center;background:rgba(41,33,28,.48);backdrop-filter:blur(12px)}.modal{width:min(500px,100%);max-height:92vh;overflow:auto;border:2px solid var(--ink);border-radius:28px;background:var(--cream);box-shadow:10px 10px 0 var(--ink)}.modal-head{padding:21px 22px 0;display:flex;align-items:center;justify-content:space-between}.modal-head h2{margin:0;font-size:29px}.close,.skip{border:0;background:transparent;color:var(--muted);font-size:13px;font-weight:750}.close{width:37px;height:37px;border:1px solid var(--line);border-radius:50%;background:var(--milk);font-size:18px}.modal-body{padding:16px 22px 23px}.lead{margin:0 0 15px;color:var(--muted);font-size:12px;line-height:1.65}.field{margin-top:12px}.field label{display:block;margin-bottom:6px;font-size:12px;font-weight:850}.input{width:100%;padding:12px 13px;border:1.5px solid var(--line);border-radius:14px;background:var(--milk);font-size:13px;outline:0}.input:focus{border-color:var(--honey);box-shadow:0 0 0 3px rgba(244,181,68,.22)}.row{display:flex;gap:8px}.row .input{flex:1}.code{padding:0 12px;border:1.5px solid var(--ink);border-radius:14px;background:var(--butter);font-size:12px;font-weight:850;white-space:nowrap}.hint{margin-top:7px;color:#9d6918;font-size:11px}.error{margin-top:7px;color:var(--red);font-size:11px}.submit{width:100%;margin-top:17px;padding:11px 15px;font-size:14px}
    .species-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px}.chip{min-width:0;padding:10px 5px;border:1px solid var(--line);border-radius:12px;background:var(--milk);font-size:12px;font-weight:800}.chip.on{border-color:var(--ink);background:var(--mint);box-shadow:2px 2px 0 var(--ink)}.sex-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
    .photo-picker{min-height:100px;padding:10px;display:flex;align-items:center;gap:12px;border:1.5px dashed var(--muted);border-radius:15px;background:var(--milk)}.photo-preview{width:82px;height:82px;flex:0 0 auto;border:1px solid var(--line);border-radius:14px;background:var(--cream2);object-fit:cover}.photo-info{flex:1}.photo-info b{display:block;font-size:12px}.photo-info p{margin:5px 0 9px;color:var(--muted);font-size:10px;line-height:1.5}.photo-btn{padding:8px 11px;border:1px solid var(--ink);border-radius:999px;background:var(--sky);font-size:12px;font-weight:800}.risk-note{padding:10px;border:1px solid var(--red);border-radius:12px;background:#ffe6df;font-size:11px;line-height:1.5}.vet{padding:13px 0;border-bottom:1px solid var(--line)}.vet:last-child{border:0}.vet-name{display:flex;justify-content:space-between;font-size:12px;font-weight:850}.vet p{margin:6px 0;color:var(--muted);font-size:11px}.vet a{color:#347e9d;font-size:11px}

    /* 产品页 */
    .app{height:100svh;padding:12px;display:grid;grid-template-columns:278px 1fr;gap:12px;background:var(--cream2)}.sidebar{min-height:0;padding:16px;display:flex;flex-direction:column;border:2px solid var(--ink);border-radius:25px;background:var(--butter);box-shadow:var(--shadow)}.side-brand{display:flex;align-items:center;gap:8px;padding:2px 2px 15px;font-size:20px}.side-brand .brand-mark{width:31px;height:31px;background:var(--milk)}
    .profile{padding:10px;display:flex;align-items:center;gap:9px;border:1.5px solid var(--ink);border-radius:16px;background:var(--milk);transition:.18s}.profile:hover{transform:translateY(-2px);box-shadow:3px 3px 0 var(--peach)}.avatar{width:39px;height:39px;border:1.5px solid var(--ink);border-radius:13px;background:var(--peach);display:grid;place-items:center;font-weight:900}.profile-text{flex:1;min-width:0}.profile-text b{display:block;font-size:12px}.profile-text span{color:var(--muted);font-size:10px}.new-chat{width:100%;margin-top:12px;padding:10px;border:1.5px solid var(--ink);border-radius:14px;background:var(--honey);box-shadow:3px 3px 0 var(--ink);font-size:13px;font-weight:900}.side-label{margin:23px 5px 7px;color:var(--muted);font-size:9px;letter-spacing:.15em;text-transform:uppercase}.history{flex:1;min-height:0;overflow:auto}.history-item{margin:3px 0;padding:9px;border:1px solid transparent;border-radius:11px;color:#745e4c;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}.history-item:hover,.history-item.on{border-color:var(--ink);background:var(--milk);color:var(--ink)}.side-foot{padding-top:10px;border-top:1px solid rgba(41,33,28,.2);display:grid}.side-link{padding:8px 4px;border:0;background:transparent;text-align:left;color:#745e4c;font-size:11px}
    .workspace{min-width:0;min-height:0;position:relative;overflow:hidden;border:2px solid var(--ink);border-radius:25px;background:var(--cream)}.appbar{height:62px;padding:0 19px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line)}.app-title{font-size:12px;font-weight:850}.outline-btn{padding:8px 12px;border:1.5px solid var(--ink);border-radius:999px;background:var(--sky);font-size:11px;font-weight:850}.menu{display:none;border:0;background:transparent;font-size:18px}
    .workspace-body{height:calc(100% - 62px);min-height:0;padding:13px}.main-zone{min-width:0;min-height:0;height:100%;display:flex;flex-direction:column;border:1px solid var(--line);border-radius:20px;background:rgba(255,254,249,.72);overflow:hidden}.pet-panel{flex:0 0 auto;min-width:0;padding:14px 18px 0;background:transparent;overflow:hidden}.pet-panel-head{display:flex;align-items:center;gap:9px;margin-bottom:9px}.pet-panel-head h3{margin:0;font-size:17px}.pet-panel-head span{color:var(--muted);font-size:10px}.pet-add-mini{width:34px;height:34px;margin-left:2px;border:1.5px dashed var(--ink);border-radius:50%;background:var(--milk);font-size:20px;line-height:1;font-weight:700;transition:.18s}.pet-add-mini:hover{transform:translateY(-2px);background:var(--honey);border-style:solid}.pet-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));align-items:stretch;gap:10px;min-width:0}.pet-grid:empty{display:none}
    .pet-card{position:relative;min-width:0;height:116px;padding:0;overflow:hidden;border:1.5px solid var(--ink);border-radius:16px;background:var(--sky);text-align:left;box-shadow:3px 3px 0 rgba(41,33,28,.25);cursor:pointer;transition:.18s}.pet-card:hover,.pet-card.on{transform:translateY(-2px);box-shadow:4px 4px 0 var(--ink)}.pet-card.on:after{display:none}.pet-card.has-photo{background-size:cover;background-position:center}.pet-card.has-photo:before{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent 35%,rgba(22,18,15,.75))}.pet-info{position:absolute;z-index:1;left:10px;right:10px;bottom:8px;transition:.18s opacity,.18s transform}.pet-info b{display:block;font-size:13px}.pet-info small{display:block;margin-top:2px;color:var(--muted);font-size:9px}.has-photo .pet-info{color:#fff}.has-photo .pet-info small{color:rgba(255,255,255,.78)}.pet-placeholder{position:absolute;inset:0;display:grid;place-items:center;font-size:30px}.pet-actions{position:absolute;z-index:4;inset:0;padding:0 18px;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));align-items:center;border-radius:inherit;background:rgba(24,20,17,.46);backdrop-filter:blur(2px);opacity:0;pointer-events:none;transition:.18s opacity}.pet-card:hover .pet-actions{opacity:1;pointer-events:auto}.pet-card:hover .pet-info{opacity:0;transform:translateY(6px)}.pet-action{appearance:none;-webkit-appearance:none;position:relative;width:100%;margin:0;padding:9px 0;display:grid;place-items:center;border:0;border-radius:0;box-shadow:none;background:none;color:#fff;font-size:12px;font-weight:850;text-align:center;text-shadow:0 1px 6px rgba(0,0,0,.45);transition:.16s color}.pet-action+.pet-action:before{content:"";position:absolute;left:0;top:50%;width:1px;height:14px;background:rgba(255,255,255,.5);transform:translateY(-50%)}.pet-action:hover{background:none;color:var(--butter)}.pet-action.ask,.pet-action.ask:hover{border:0;box-shadow:none;background:none}.pet-action.ask{color:#fff}.pet-action.ask:hover{color:var(--butter)}
    .welcome{flex:1;min-height:0;padding:19px;display:grid;place-items:center}.welcome-inner{width:min(760px,100%);text-align:center;transform:translateY(-18px)}.welcome-mark{width:53px;height:53px;margin:auto;border:2px solid var(--ink);border-radius:19px;background:var(--honey);box-shadow:4px 4px 0 var(--ink);display:grid;place-items:center;font-size:23px;transform:rotate(-4deg)}.welcome h1{margin:22px 0 18px;font-size:clamp(38px,4.5vw,64px);line-height:.9;white-space:nowrap}.welcome h1 span{color:var(--blue)}.ask{max-width:620px;margin:auto;padding:9px;border:2px solid var(--ink);border-radius:20px;background:var(--milk);box-shadow:5px 5px 0 var(--peach);text-align:left}.ask textarea{width:100%;min-height:60px;padding:9px;border:0;outline:0;resize:none;background:transparent;font-size:13px;line-height:1.5}.ask-foot{display:flex;align-items:center;justify-content:space-between}.round{width:36px;height:36px;border:1px solid var(--line);border-radius:50%;background:var(--mint);font-size:14px}.send{padding:9px 15px;border:1.5px solid var(--ink);border-radius:999px;background:var(--honey);font-size:12px;font-weight:850}.suggestions{margin-top:12px;display:flex;justify-content:center;flex-wrap:wrap;gap:7px}.suggest{padding:7px 10px;border:1px solid var(--line);border-radius:999px;background:var(--milk);color:var(--muted);font-size:10px}.suggest:hover{border-color:var(--ink);background:var(--mint);color:var(--ink)}
    .preview{display:flex;align-items:center;gap:8px;padding:3px 5px 8px;color:var(--muted);font-size:10px}.preview img{width:42px;height:42px;border-radius:10px;object-fit:cover}.preview button{border:0;background:transparent;color:var(--red);font-size:10px}.chat{display:none;flex:1;min-height:0;flex-direction:column}.chat.show{display:flex}.messages{flex:1;min-height:0;padding:20px;overflow:auto}.messages-inner{width:min(680px,100%);margin:auto;display:grid;gap:18px}.message{display:flex;align-items:flex-start;gap:8px}.message.user{flex-direction:row-reverse}.msg-avatar{width:33px;height:33px;flex:0 0 auto;border:1.5px solid var(--ink);border-radius:11px;background:var(--milk);display:grid;place-items:center;font-size:14px}.message.user .msg-avatar{background:var(--peach);font-size:9px;font-weight:900}.bubble{max-width:78%;padding:11px 13px;border:1px solid var(--line);border-radius:16px 16px 16px 5px;background:var(--milk);font-size:11px;line-height:1.7}.message.user .bubble{border-color:var(--ink);border-radius:16px 5px 16px 16px;background:var(--blue);color:#fff;white-space:pre-wrap}.bubble p{margin:0 0 7px}.bubble p:last-child{margin:0}.bubble img{display:block;max-width:210px;max-height:160px;margin-bottom:7px;border-radius:10px;object-fit:cover}.high-risk{margin-bottom:7px;padding:9px;border:1px solid var(--red);border-radius:10px;background:#ffe6df;color:#9e302b;font-weight:900}.map-entry{margin-top:7px;padding:8px 10px;border:1px solid var(--ink);border-radius:999px;background:var(--peach);font-size:10px;font-weight:850}.composer{padding:10px 18px 14px;border-top:1px solid var(--line)}.composer-inner{width:min(680px,100%);margin:auto;display:flex;align-items:end;gap:7px}.composer textarea{flex:1;padding:10px 11px;border:1px solid var(--line);border-radius:14px;background:var(--milk);outline:0;resize:none;font-size:12px}
    /* 个人中心下一级页面 */
    .profile-page{position:absolute;z-index:20;inset:0;padding:20px;background:var(--cream);overflow:auto}.profile-page-head{display:flex;align-items:center;gap:11px;padding-bottom:17px;border-bottom:1px solid var(--line)}.back{width:39px;height:39px;border:1.5px solid var(--ink);border-radius:50%;background:var(--milk);font-size:20px}.profile-page-head h2{margin:0;font-size:25px}.profile-layout{max-width:720px;margin:25px auto;display:grid;gap:15px}.profile-card{padding:20px;border:1.5px solid var(--ink);border-radius:20px;background:var(--butter);box-shadow:4px 4px 0 var(--ink)}.big-avatar{width:70px;height:70px;margin-bottom:14px;border:1.5px solid var(--ink);border-radius:22px;background:var(--peach);display:grid;place-items:center;font-size:25px;font-weight:900}.settings-card{padding:18px;border:1px solid var(--line);border-radius:20px;background:var(--milk)}.settings-card h3{margin:0 0 12px;font-size:16px}.setting-row{padding:12px 0;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);font-size:12px}.setting-row:last-child{border:0}.danger-btn{width:100%;padding:11px;border:1.5px solid var(--red);border-radius:13px;background:#ffe6df;color:#9e302b;font-size:13px;font-weight:850}
    .toast{position:fixed;z-index:130;left:50%;bottom:24px;transform:translateX(-50%);padding:10px 14px;border:1px solid var(--ink);border-radius:999px;background:var(--honey);box-shadow:3px 3px 0 var(--ink);font-size:11px;font-weight:800}
    @media(max-width:1050px){.arc-title{top:18px;width:92vw}.pet-grid{grid-template-columns:repeat(5,128px);overflow-x:auto;padding-bottom:4px}}
    @media(max-width:760px){.video-home{min-height:570px}.topbar{height:74px;padding:0 14px}.brand{font-size:17px;padding:6px 10px 6px 7px}.brand-mark{width:29px;height:29px}.btn{padding:8px 11px;font-size:11px}.arc-title{top:8px;width:110vw;height:210px}.arc-title text{font-size:85px}.bottom{left:14px;right:14px;bottom:17px}.status-card small{display:none}.app{grid-template-columns:1fr;padding:7px}.sidebar{position:fixed;z-index:60;inset:7px auto 7px 7px;width:270px;transform:translateX(-110%);transition:.22s}.sidebar.open{transform:none}.workspace{border-radius:20px}.menu{display:block}.workspace-body{height:calc(100% - 62px);overflow:auto}.pet-panel{padding:12px 13px 0;overflow:hidden}.pet-grid{grid-template-columns:repeat(5,125px);overflow-x:auto}.pet-card{height:105px}.main-zone{min-height:520px}.welcome h1{font-size:30px}.species-grid{grid-template-columns:repeat(3,1fr)}}
  </style>
</head>
<body>
  <section class="screen active" id="landing">
    <main class="video-home">
      <video class="hero-video" id="heroVideo" autoplay muted loop playsinline><source src="./最新版视频.mp4" type="video/mp4"></video>
      <header class="topbar"><div class="brand display"><span class="brand-mark">🐾</span>Yoyo</div><div class="top-actions"><button class="btn btn-light" onclick="App.openAuth()">登录</button><button class="btn btn-primary" onclick="App.openAuth()">开始提问&nbsp; ↗</button></div></header>
      <svg class="arc-title" viewBox="0 0 1000 300" aria-label="Hi, I'm Yoyo">
        <defs><path id="titleArc" d="M 95 255 Q 500 -25 905 255"/></defs>
        <text><textPath href="#titleArc" startOffset="50%" text-anchor="middle">Hi, I'm Yoyo</textPath></text>
      </svg>
      <footer class="bottom"><div class="status-card"><span class="status-dot"></span><div><b>异宠 AI 养护助手</b><small>日常养护｜行为解读｜症状分析</small></div></div><button class="video-toggle" id="videoToggle" onclick="App.toggleVideo()">Ⅱ</button></footer>
    </main>
  </section>

  <section class="screen" id="inside">
    <div class="app">
      <aside class="sidebar" id="sidebar">
        <div class="side-brand display"><span class="brand-mark">🐾</span>Yoyo</div>
        <button class="profile" onclick="App.openProfile()"><div class="avatar" id="sideAvatar">异</div><div class="profile-text"><b id="sideName">异宠用户</b><span id="sidePhone">188****0000</span></div><span>›</span></button>
        <button class="new-chat" onclick="App.newChat()">＋ 新对话</button><div class="side-label">Recent chats</div><div class="history" id="history"></div>
        <div class="side-foot"><button class="side-link" onclick="App.goHome()">↙ 返回首页</button></div>
      </aside>
      <main class="workspace">
        <header class="appbar"><div style="display:flex;align-items:center;gap:8px"><button class="menu" onclick="App.toggleSidebar()">☰</button><span class="app-title">YOYO AI / 异宠养护助手</span></div><button class="outline-btn" onclick="App.openMap('manual')">附近医院&nbsp; ↗</button></header>
        <div class="workspace-body">
          <section class="main-zone">
            <aside class="pet-panel"><div class="pet-panel-head"><h3 class="display">我的小伙伴</h3><span id="petCount">0 / 5</span><button class="pet-add-mini" onclick="App.openPet()" title="添加宠物">＋</button></div><div class="pet-grid" id="petGrid"></div></aside>
            <div class="welcome" id="welcome"><div class="welcome-inner"><div class="welcome-mark">🐾</div><h1 class="display">今天想问<span>什么小问题？</span></h1><div class="ask"><textarea id="heroInput" rows="2" placeholder="比如：我家雪貂最近老掉毛，还特别爱咬东西…"></textarea><div class="ask-foot"><button class="round" onclick="App.pickChatImage()">⌁</button><button class="send" onclick="App.send('hero')">发送&nbsp; ↑</button></div></div><div class="suggestions" id="suggestions"></div></div></div>
            <div class="chat" id="chat"><div class="messages" id="messages"><div class="messages-inner" id="messagesInner"></div></div><div class="composer"><div class="composer-inner"><button class="round" onclick="App.pickChatImage()">⌁</button><textarea id="chatInput" rows="1" placeholder="继续追问…"></textarea><button class="send" onclick="App.send('chat')">发送&nbsp; ↑</button></div></div></div>
          </section>
        </div>
        <section class="profile-page hidden" id="profilePage">
          <div class="profile-page-head"><button class="back" onclick="App.closeProfile()">‹</button><h2 class="display">个人信息</h2></div>
          <div class="profile-layout">
            <div class="profile-card"><div class="big-avatar" id="bigAvatar">异</div><div class="field"><label>昵称</label><input class="input" id="profileName"></div><div class="field"><label>手机号</label><input class="input" id="profilePhone" inputmode="numeric" maxlength="11"></div><button class="btn btn-primary submit" onclick="App.saveProfile()">保存修改</button></div>
            <div class="settings-card"><h3>账号与设置</h3><div class="setting-row"><span>高危就医提醒</span><input type="checkbox" checked></div><div class="setting-row"><span>允许定位（附近医院）</span><input type="checkbox" checked></div><div class="setting-row"><span>当前版本</span><span>Yoyo Demo v0.4</span></div></div>
            <button class="danger-btn" onclick="App.logout()">退出登录</button>
          </div>
        </section>
      </main>
    </div>
  </section>
  <div id="modalMount"></div><div id="toastMount"></div>

  <script>
    const $=s=>document.querySelector(s),esc=s=>String(s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
    const SPECIES=["雪貂","龙猫","兔兔","蜜袋鼯","其他"],SUGGEST=["一天喂几次？","笼子和垫材怎么选？","最近老掉毛，还爱咬东西","突然抽搐，叫不醒"];
    const EMERGENCY=["抽搐","痉挛","出血","呼吸困难","昏迷","瘫痪","中毒","持续呕吐","休克"],ANOMALY=["掉毛","脱毛","变瘦","亢奋","爱咬","嗜睡","发抖","无力"];
    const VETS=[["毛球动物医院 · 中心店","0.8 km","示例市元气路 18 号","010-00000000"],["24H 小动物急诊","2.3 km","示例市月光大道 66 号","010-11111111"],["奇妙异宠诊所","3.6 km","示例市森林街 5 号","010-22222222"]];
    const state={user:{name:"异宠用户",phone:"18800000000"},pets:[],selected:0,chats:[],active:null,streaming:false,prompted:false,pendingImage:null,petDraftPhoto:null,editingPet:null};let seed=1;const uid=()=>`id${seed++}`;
    function answerFor(text){if(EMERGENCY.some(k=>text.includes(k)))return{high:true,text:"**请立即就医**\n你描述的情况可能属于紧急状况，请尽快带它前往能接诊异宠的宠物医院。\n\n出发前保持安静和温暖，不要强行喂食或自行用药；如果方便，记录症状开始时间并拍下短视频。\n\n本回答为 AI 辅助参考，不替代执业兽医诊断。"};if(ANOMALY.some(k=>text.includes(k)))return{high:false,text:"这些变化值得留意。掉毛与异常亢奋可能和季节换毛、压力或潜在健康问题有关，不能只凭一条描述判断。\n\n建议记录掉毛位置、持续时间、食欲和体重变化；若持续加重，请预约能看异宠的兽医。"};return{high:false,text:"可以先从饮食、环境温湿度和近期活动量三个方面检查。\n\n你可以继续补充具体表现，我会帮你把建议缩小到更实用的范围。"}}
    const App={
      show(id){document.querySelectorAll(".screen").forEach(x=>x.classList.remove("active"));$(id).classList.add("active")},
      toggleVideo(){const v=$("#heroVideo"),b=$("#videoToggle");if(v.paused){v.play();b.textContent="Ⅱ"}else{v.pause();b.textContent="▶"}},
      openAuth(){$("#modalMount").innerHTML=`<div class="mask" onclick="if(event.target===this)App.closeModal()"><div class="modal"><div class="modal-head"><h2 class="display">登录 Yoyo</h2><button class="close" onclick="App.closeModal()">×</button></div><div class="modal-body"><p class="lead">登录后即可保存宠物档案和历史对话。</p><div class="field"><label>手机号</label><input id="phone" class="input" value="18800000000" maxlength="11" inputmode="numeric"></div><div class="field"><label>验证码</label><div class="row"><input id="codeInput" class="input" placeholder="输入 000000" maxlength="6" inputmode="numeric"><button class="code" onclick="App.sendCode(this)">获取验证码</button></div></div><div class="hint">演示验证码：000000</div><div id="authError" class="error hidden"></div><button class="btn btn-primary submit" onclick="App.login()">进入 Yoyo&nbsp; ↗</button></div></div></div>`;setTimeout(()=>$("#codeInput").focus(),60)},
      sendCode(b){b.textContent="已发送 · 60s";b.disabled=true;this.toast("验证码已发送 · 000000")},
      login(){const p=$("#phone").value.trim(),c=$("#codeInput").value.trim();if(!/^1[3-9]\d{9}$/.test(p)||c!=="000000"){const e=$("#authError");e.classList.remove("hidden");e.textContent="请输入有效手机号和演示验证码 000000";return}state.user.phone=p;this.renderUser();this.closeModal();this.show("#inside");this.renderAll();if(!state.prompted){state.prompted=true;setTimeout(()=>this.openPet(true),220)}},
      renderUser(){const n=state.user.name||"异宠用户",masked=state.user.phone.slice(0,3)+"****"+state.user.phone.slice(7);$("#sideName").textContent=n;$("#sidePhone").textContent=masked;$("#sideAvatar").textContent=n.charAt(0);$("#bigAvatar").textContent=n.charAt(0)},
      goHome(){this.closeSidebar();this.show("#landing")},closeModal(){$("#modalMount").innerHTML=""},
      openPet(first=false,editIndex=null){const editing=editIndex!==null,pet=editing?state.pets[editIndex]:null;if(!editing&&state.pets.length>=5){this.showPetLimit();return}state.editingPet=editing?editIndex:null;state.petDraftPhoto=pet?.photo||null;$("#modalMount").innerHTML=`<div class="mask" onclick="if(event.target===this)App.closeModal()"><div class="modal"><div class="modal-head"><h2 class="display">${editing?"编辑宠物":first?"添加第一只宠物":"添加小伙伴"}</h2><button class="skip" onclick="App.closeModal()">${first&&!editing?"暂不填写":"关闭"}</button></div><div class="modal-body"><p class="lead">${editing?"修改后会同步更新该宠物卡片与后续提问信息。":"最多添加 5 只宠物，每只宠物支持上传 1 张照片作为卡片封面。"}</p><div class="field"><label>宠物照片（仅限一张）</label><div id="petPhotoBox"></div></div><div class="field"><label>昵称</label><input id="petName" class="input" placeholder="比如：十一" value="${esc(pet?.name||"")}"></div><div class="field"><label>品种</label><div class="species-grid" id="species">${SPECIES.map((s,i)=>`<button class="chip ${(pet?pet.species===s:i===0)?"on":""}" data-name="${s}" onclick="App.pickChip(this)">${s}</button>`).join("")}</div></div><div class="field"><label>年龄（可选）</label><input id="petAge" class="input" placeholder="比如：8 个月" value="${esc(pet?.age==="年龄未知"?"":pet?.age||"")}"></div><div class="field"><label>性别</label><div class="sex-grid" id="sex">${["未知","公","母"].map((s,i)=>`<button class="chip ${(pet?pet.sex===s:i===0)?"on":""}" data-value="${s}" onclick="App.pickChip(this)">${s}</button>`).join("")}</div></div><div id="petError" class="error hidden"></div><button class="btn btn-primary submit" onclick="App.savePet()">${editing?"保存修改":"保存宠物档案"}</button></div></div></div>`;this.renderPetPhoto()},
      renderPetPhoto(){const box=$("#petPhotoBox");if(!box)return;box.innerHTML=`<div class="photo-picker">${state.petDraftPhoto?`<img class="photo-preview" src="${state.petDraftPhoto}" alt="宠物照片">`:`<div class="photo-preview" style="display:grid;place-items:center;font-size:26px">＋</div>`}<div class="photo-info"><b>${state.petDraftPhoto?"照片已选择":"上传一张宠物照片"}</b><p>支持 JPG、PNG、WebP，最大 10MB；再次选择会替换当前照片。</p><button class="photo-btn" onclick="App.pickPetPhoto()">${state.petDraftPhoto?"更换照片":"选择照片"}</button></div></div>`},
      pickPetPhoto(){const i=document.createElement("input");i.type="file";i.accept="image/jpeg,image/png,image/webp";i.onchange=()=>{const f=i.files?.[0];if(!f)return;if(f.size>10*1024*1024){this.toast("图片不能超过 10MB");return}state.petDraftPhoto=URL.createObjectURL(f);this.renderPetPhoto()};i.click()},
      pickChip(el){el.parentElement.querySelectorAll(".chip").forEach(x=>x.classList.remove("on"));el.classList.add("on")},
      savePet(){const n=$("#petName").value.trim();if(!n){$("#petError").classList.remove("hidden");$("#petError").textContent="请先填写宠物昵称";return}const pet={name:n,species:$("#species .on").dataset.name,age:$("#petAge").value.trim()||"年龄未知",sex:$("#sex .on").dataset.value,photo:state.petDraftPhoto};if(state.editingPet!==null){state.pets[state.editingPet]=pet;state.selected=state.editingPet}else{state.pets.push(pet);state.selected=state.pets.length-1}const edited=state.editingPet!==null;state.editingPet=null;this.closeModal();this.renderPets();this.toast(edited?`${n} 的档案已更新`:`${n} 的档案保存好了`)},
      showPetLimit(){$("#modalMount").innerHTML=`<div class="mask" onclick="if(event.target===this)App.closeModal()"><div class="modal" style="max-width:390px"><div class="modal-head"><h2 class="display">宠物数量已满</h2><button class="close" onclick="App.closeModal()">×</button></div><div class="modal-body"><p class="lead">目前仅支持上传五个宠物。如需添加新的宠物，请先编辑或移除已有宠物档案。</p><button class="btn btn-primary submit" onclick="App.closeModal()">我知道了</button></div></div></div>`},
      renderAll(){this.renderUser();this.renderPets();this.renderHistory();this.renderSuggestions();this.renderMessages();this.updateView()},
      renderPets(){const colors=["var(--sky)","var(--peach)","var(--butter)","var(--lilac,#ddd2ee)","var(--milk)"];$("#petGrid").innerHTML=state.pets.map((p,i)=>`<div class="pet-card ${p.photo?"has-photo":""} ${i===state.selected?"on":""}" style="${p.photo?`background-image:url('${p.photo}')`:`background:${colors[i%colors.length]}`}" onclick="App.selectPet(${i})">${p.photo?"":`<span class="pet-placeholder">🐾</span>`}<span class="pet-info"><b>${esc(p.name)}</b><small>${esc(p.species)} · ${esc(p.age)}</small></span><span class="pet-actions"><button class="pet-action" onclick="event.stopPropagation();App.editPet(${i})">编辑</button><button class="pet-action ask" onclick="event.stopPropagation();App.askPet(${i})">提问</button></span></div>`).join("");$("#petCount").textContent=`${state.pets.length} / 5`},
      selectPet(i){state.selected=i;this.renderPets();const p=state.pets[i],input=this.current()?.messages.length?$("#chatInput"):$("#heroInput");input.placeholder=`问问关于 ${p.name}（${p.species}）的问题…`;input.focus()},
      editPet(i){this.openPet(false,i)},
      askPet(i){state.selected=i;this.renderPets();const p=state.pets[i],input=this.current()?.messages.length?$("#chatInput"):$("#heroInput");const question=input.value.replace(/^我想咨询「[^」]+」（[^）]*）：\s*/,"");const info=[p.species,p.age,p.sex].filter(Boolean).join("，"),prefix=`我想咨询「${p.name}」（${info}）：`;input.value=prefix+question;input.focus();input.setSelectionRange?.(prefix.length,prefix.length)},
      renderSuggestions(){$("#suggestions").innerHTML=SUGGEST.map(q=>`<button class="suggest" onclick="App.send('hero','${q}')">${q}</button>`).join("")},current(){return state.chats.find(c=>c.id===state.active)},
      newChat(){state.active=null;state.pendingImage=null;this.renderAll();this.renderPreview();this.closeSidebar();$("#heroInput").value=""},openChat(id){state.active=id;this.renderAll();this.closeSidebar()},renderHistory(){$("#history").innerHTML=state.chats.length?state.chats.map(c=>`<div class="history-item ${c.id===state.active?"on":""}" onclick="App.openChat('${c.id}')">${esc(c.title)}</div>`).join(""):`<div class="history-item" style="opacity:.55">还没有对话</div>`},updateView(){const started=this.current()?.messages.length;$("#welcome").classList.toggle("hidden",!!started);$("#chat").classList.toggle("show",!!started)},
      send(where,preset){if(state.streaming)return;const input=where==="hero"?$("#heroInput"):$("#chatInput"),text=String(preset??input.value).trim();if(!text&&!state.pendingImage)return;let c=this.current();if(!c){c={id:uid(),title:text.slice(0,22)||"图片提问",messages:[]};state.chats.unshift(c);state.active=c.id}const p=state.pets[state.selected],context=p?`[${p.name} · ${p.species} · ${p.age} · ${p.sex}] `:"";c.messages.push({role:"user",text:text||"请帮我看看这张图片",context,image:state.pendingImage});input.value="";state.pendingImage=null;this.renderPreview();this.renderHistory();this.updateView();this.renderMessages();const r=answerFor(text||"图片"),m={role:"ai",text:"",high:r.high};c.messages.push(m);state.streaming=true;let i=0;const t=setInterval(()=>{i=Math.min(r.text.length,i+4);m.text=r.text.slice(0,i);this.renderMessages();if(i>=r.text.length){clearInterval(t);state.streaming=false;this.renderMessages();if(r.high)setTimeout(()=>this.openMap("high"),380)}},18)},
      renderMessages(){const c=this.current();if(!c){$("#messagesInner").innerHTML="";return}$("#messagesInner").innerHTML=c.messages.map(m=>{if(m.role==="user")return`<div class="message user"><div class="msg-avatar">我</div><div class="bubble">${m.image?`<img src="${m.image}" alt="用户上传图片">`:""}${m.context?`<span style="display:block;color:#d9f0fa;font-size:8px;margin-bottom:4px">${esc(m.context)}</span>`:""}${esc(m.text)}</div></div>`;const body=m.text.split("\n").map(line=>{const safe=esc(line).replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>");return/请立即就医/.test(line)?`<div class="high-risk">${safe}</div>`:`<p>${safe||"&nbsp;"}</p>`}).join("");return`<div class="message ai"><div class="msg-avatar">🐾</div><div class="bubble">${body}${m.high?`<button class="map-entry" onclick="App.openMap('high')">📍 查看附近医院</button>`:""}</div></div>`}).join("");const b=$("#messages");b.scrollTop=b.scrollHeight},
      pickChatImage(){const i=document.createElement("input");i.type="file";i.accept="image/jpeg,image/png,image/webp";i.onchange=()=>{const f=i.files?.[0];if(!f)return;if(f.size>10*1024*1024){this.toast("图片不能超过 10MB");return}state.pendingImage=URL.createObjectURL(f);this.renderPreview();this.toast("图片已添加")};i.click()},renderPreview(){document.querySelectorAll(".preview").forEach(x=>x.remove());if(!state.pendingImage)return;const h=`<div class="preview"><img src="${state.pendingImage}" alt="待发送图片"><span>图片已准备好</span><button onclick="App.clearImage()">移除</button></div>`;$(".ask-foot")?.insertAdjacentHTML("beforebegin",h);$(".composer-inner")?.insertAdjacentHTML("beforebegin",h)},clearImage(){state.pendingImage=null;this.renderPreview()},
      openProfile(){this.closeSidebar();$("#profileName").value=state.user.name;$("#profilePhone").value=state.user.phone;$("#profilePage").classList.remove("hidden")},closeProfile(){$("#profilePage").classList.add("hidden")},saveProfile(){const n=$("#profileName").value.trim(),p=$("#profilePhone").value.trim();if(!n){this.toast("请填写昵称");return}if(!/^1[3-9]\d{9}$/.test(p)){this.toast("请输入有效手机号");return}state.user={name:n,phone:p};this.renderUser();this.toast("个人信息已更新")},logout(){location.reload()},
      openMap(source){$("#modalMount").innerHTML=`<div class="mask" onclick="if(event.target===this)App.closeModal()"><div class="modal"><div class="modal-head"><h2 class="display">附近医院</h2><button class="close" onclick="App.closeModal()">×</button></div><div class="modal-body">${source==="high"?`<div class="risk-note"><b>检测到高危描述</b><br>请优先联系医院并尽快出发。</div>`:""}<p class="lead" style="margin-top:12px">以下为演示数据，出发前请电话确认能否接诊异宠。</p>${VETS.map(v=>`<div class="vet"><div class="vet-name"><span>${v[0]}</span><span>${v[1]}</span></div><p>${v[2]}</p><a href="tel:${v[3]}">致电 ${v[3]} ↗</a></div>`).join("")}</div></div></div>`},
      toggleSidebar(){$("#sidebar").classList.toggle("open")},closeSidebar(){$("#sidebar").classList.remove("open")},toast(t){$("#toastMount").innerHTML=`<div class="toast">${esc(t)}</div>`;clearTimeout(this.toastTimer);this.toastTimer=setTimeout(()=>$("#toastMount").innerHTML="",2100)}
    };
    document.addEventListener("keydown",e=>{if(e.key==="Escape"){App.closeModal();App.closeProfile()}if(e.key==="Enter"&&!e.shiftKey){if(document.activeElement?.id==="heroInput"){e.preventDefault();App.send("hero")}if(document.activeElement?.id==="chatInput"){e.preventDefault();App.send("chat")}}});window.addEventListener("load",()=>App.renderSuggestions());
  </script>
</body>
