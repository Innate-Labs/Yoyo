<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>MochiCare · 全屏视频版</title>
  <style>
    :root{
      --ink:#101013;
      --paper:#f5f3f7;
      --paper-2:#ebe8ef;
      --white:#fff;
      --purple:#9b83ff;
      --purple-soft:#e8e2ff;
      --muted:#77737e;
      --line:rgba(16,16,19,.16);
      --red:#eb5b61;
      --shadow:6px 6px 0 var(--ink);
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0}
    body{font-family:Inter,-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased}
    button,input,textarea{font:inherit}
    button{cursor:pointer}
    .display{font-family:"Arial Rounded MT Bold","Arial Black","PingFang SC",sans-serif;font-weight:900;letter-spacing:-.04em}
    .screen{display:none}
    .screen.active{display:block}
    .hidden{display:none!important}

    /* 全屏视频登录页 */
    .video-login{height:100svh;min-height:620px;position:relative;overflow:hidden;background:#18171c;color:#fff}
    .hero-video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
    .video-login:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(8,8,10,.42) 0,rgba(8,8,10,.03) 34%,rgba(8,8,10,.08) 58%,rgba(8,8,10,.64) 100%);pointer-events:none}
    .topbar{position:relative;z-index:2;height:90px;padding:0 34px;display:flex;align-items:center;justify-content:space-between}
    .brand{display:flex;align-items:center;gap:10px;font-size:22px;text-shadow:0 2px 12px rgba(0,0,0,.25)}
    .brand-mark{width:36px;height:36px;border:2px solid currentColor;border-radius:50%;background:var(--purple);color:var(--ink);display:grid;place-items:center;box-shadow:3px 3px 0 currentColor}
    .top-actions{display:flex;align-items:center;gap:10px}
    .btn{border:0;border-radius:999px;padding:12px 19px;font-size:12px;font-weight:800;transition:transform .2s,background .2s}
    .btn:hover{transform:translateY(-2px)}
    .btn-login{color:#fff;border:1px solid rgba(255,255,255,.65);background:rgba(20,20,24,.16);backdrop-filter:blur(12px)}
    .btn-start{color:var(--ink);background:var(--purple);border:1px solid var(--ink);box-shadow:3px 3px 0 var(--ink)}
    .top-note{position:absolute;z-index:2;top:37px;left:50%;transform:translateX(-50%);font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.78)}
    .bottombar{position:absolute;z-index:2;left:34px;right:34px;bottom:28px;display:flex;align-items:end;justify-content:space-between;gap:20px}
    .bottom-copy{display:flex;align-items:center;gap:14px;padding:12px 15px;border:1px solid rgba(255,255,255,.28);border-radius:18px;background:rgba(18,18,22,.23);backdrop-filter:blur(15px)}
    .status-dot{width:8px;height:8px;border-radius:50%;background:#91efb4;box-shadow:0 0 0 5px rgba(145,239,180,.14)}
    .bottom-copy b{display:block;font-size:13px}
    .bottom-copy span{display:block;margin-top:3px;font-size:9px;color:rgba(255,255,255,.66)}
    .video-tools{display:flex;align-items:center;gap:8px}
    .video-tool{width:45px;height:45px;border-radius:50%;border:1px solid rgba(255,255,255,.45);background:rgba(18,18,22,.2);backdrop-filter:blur(12px);color:#fff}

    /* 弹窗 */
    .modal-mask{position:fixed;z-index:100;inset:0;background:rgba(9,9,11,.55);backdrop-filter:blur(12px);display:grid;place-items:center;padding:18px}
    .modal{width:min(460px,100%);max-height:90vh;overflow:auto;background:var(--paper);color:var(--ink);border:2px solid var(--ink);border-radius:28px;box-shadow:10px 10px 0 var(--ink)}
    .modal-head{display:flex;align-items:center;justify-content:space-between;padding:22px 23px 0}
    .modal-head h2{font-size:29px;margin:0}
    .close{width:38px;height:38px;border-radius:50%;border:1px solid var(--line);background:#fff;font-size:19px}
    .modal-body{padding:17px 23px 24px}
    .modal-lead{font-size:12px;line-height:1.7;color:var(--muted);margin:0 0 17px}
    .field{margin-top:13px}
    .field label{display:block;margin-bottom:6px;font-size:10px;font-weight:800}
    .input{width:100%;padding:13px 14px;border:1px solid var(--line);border-radius:14px;background:#fff;outline:0}
    .input:focus{border-color:var(--purple);box-shadow:0 0 0 3px var(--purple-soft)}
    .row{display:flex;gap:8px}
    .row .input{flex:1}
    .code{border:1px solid var(--ink);border-radius:14px;background:var(--purple-soft);padding:0 13px;font-size:10px;font-weight:800;white-space:nowrap}
    .form-hint{font-size:10px;color:#6952c9;margin-top:7px}
    .form-error{font-size:10px;color:var(--red);margin-top:7px}
    .modal-submit{width:100%;margin-top:18px;background:var(--ink);color:#fff}
    .skip{border:0;background:transparent;color:var(--muted);font-size:10px}
    .chips{display:flex;flex-wrap:wrap;gap:7px}
    .chip{border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 12px;font-size:10px;font-weight:700}
    .chip.on{background:var(--purple);border-color:var(--ink);box-shadow:2px 2px 0 var(--ink)}
    .vet{padding:14px 0;border-bottom:1px solid var(--line)}
    .vet:last-child{border:0}
    .vet-name{display:flex;justify-content:space-between;gap:14px;font-size:12px;font-weight:800}
    .vet p{font-size:10px;color:var(--muted);margin:6px 0}
    .vet a{font-size:10px;color:#654fc5}
    .risk-note{padding:11px 12px;background:#ffe3e4;border:1px solid var(--red);border-radius:13px;font-size:10px;line-height:1.5}

    /* 登录后的产品页 */
    .app{height:100svh;display:grid;grid-template-columns:278px 1fr;background:var(--paper-2);padding:12px;gap:12px}
    .sidebar{min-height:0;background:var(--paper);border:2px solid var(--ink);border-radius:25px;box-shadow:var(--shadow);padding:16px;display:flex;flex-direction:column}
    .side-brand{display:flex;align-items:center;gap:9px;font-size:20px;padding:3px 2px 17px}
    .side-brand .brand-mark{width:32px;height:32px;box-shadow:2px 2px 0 var(--ink)}
    .profile{display:flex;align-items:center;gap:10px;padding:11px;border:1px solid var(--ink);background:#fff;border-radius:16px}
    .avatar{width:38px;height:38px;border-radius:13px;background:var(--purple);border:1px solid var(--ink);display:grid;place-items:center;font-weight:900}
    .profile-text{flex:1;min-width:0}
    .profile-text b{display:block;font-size:11px}
    .profile-text span{font-size:9px;color:var(--muted)}
    .new-chat{width:100%;margin-top:12px;border:1px solid var(--ink);border-radius:14px;padding:11px;background:var(--purple);box-shadow:3px 3px 0 var(--ink);font-size:11px;font-weight:900}
    .side-label{margin:24px 5px 8px;font-size:8px;letter-spacing:.15em;color:var(--muted);text-transform:uppercase}
    .history{flex:1;min-height:0;overflow:auto}
    .history-item{padding:10px;margin:3px 0;border:1px solid transparent;border-radius:12px;font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
    .history-item:hover,.history-item.on{border-color:var(--ink);background:#fff;color:var(--ink)}
    .side-foot{padding-top:11px;border-top:1px solid var(--line);display:grid;gap:3px}
    .side-link{border:0;background:transparent;text-align:left;padding:8px 4px;font-size:10px;color:var(--muted)}

    .workspace{min-width:0;min-height:0;background:var(--paper);border:2px solid var(--ink);border-radius:25px;overflow:hidden;display:flex;flex-direction:column}
    .appbar{height:64px;flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;padding:0 22px;border-bottom:1px solid var(--line)}
    .app-title{font-size:11px;font-weight:800}
    .app-actions{display:flex;gap:8px}
    .outline-btn{border:1px solid var(--ink);background:#fff;border-radius:999px;padding:8px 13px;font-size:9px;font-weight:800}
    .menu{display:none;border:0;background:transparent;font-size:18px}
    .pets{display:flex;gap:8px;padding:13px 22px 5px;overflow-x:auto}
    .pet{flex:0 0 auto;display:flex;align-items:center;gap:8px;border:1px solid var(--line);background:#fff;border-radius:15px;padding:7px 11px 7px 7px}
    .pet.on{border-color:var(--ink);box-shadow:3px 3px 0 var(--purple)}
    .pet-icon{width:32px;height:32px;border-radius:10px;background:var(--purple-soft);display:grid;place-items:center;font-size:16px}
    .pet b{display:block;font-size:10px}.pet small{display:block;font-size:8px;color:var(--muted)}
    .add-pet{width:46px;flex:0 0 auto;border:1px dashed var(--muted);border-radius:15px;background:transparent;font-size:18px}

    .welcome{flex:1;min-height:0;display:grid;place-items:center;padding:22px}
    .welcome-inner{width:min(760px,100%);text-align:center}
    .welcome-mark{width:56px;height:56px;margin:auto;border:2px solid var(--ink);border-radius:18px;background:var(--purple);box-shadow:4px 4px 0 var(--ink);display:grid;place-items:center;font-size:25px;transform:rotate(-4deg)}
    .welcome h1{font-size:clamp(43px,6vw,76px);line-height:.9;margin:24px 0 10px}
    .welcome h1 span{color:var(--purple)}
    .welcome p{font-size:10px;color:var(--muted);margin:0 0 23px}
    .ask{max-width:700px;margin:auto;background:#fff;border:2px solid var(--ink);border-radius:21px;padding:9px;box-shadow:5px 5px 0 var(--purple);text-align:left}
    .ask textarea{width:100%;min-height:63px;padding:10px;border:0;outline:0;resize:none;line-height:1.5}
    .ask-foot{display:flex;align-items:center;justify-content:space-between}
    .round{width:36px;height:36px;border:1px solid var(--line);background:var(--paper);border-radius:50%}
    .send{border:0;background:var(--ink);color:#fff;border-radius:999px;padding:10px 16px;font-size:10px;font-weight:800}
    .suggestions{display:flex;justify-content:center;flex-wrap:wrap;gap:7px;margin-top:17px}
    .suggest{border:1px solid var(--line);background:transparent;border-radius:999px;padding:8px 11px;font-size:9px;color:var(--muted)}
    .suggest:hover{border-color:var(--purple);background:var(--purple-soft);color:var(--ink)}
    .preview{display:flex;align-items:center;gap:8px;padding:3px 5px 9px;font-size:9px;color:var(--muted)}
    .preview img{width:43px;height:43px;border-radius:10px;object-fit:cover}
    .preview button{border:0;background:transparent;color:var(--red);font-size:9px}

    .chat{display:none;flex:1;min-height:0;flex-direction:column}
    .chat.show{display:flex}
    .messages{flex:1;min-height:0;overflow:auto;padding:25px}
    .messages-inner{width:min(760px,100%);margin:auto;display:grid;gap:20px}
    .message{display:flex;align-items:flex-start;gap:9px}
    .message.user{flex-direction:row-reverse}
    .msg-avatar{width:34px;height:34px;flex:0 0 auto;border:1px solid var(--ink);border-radius:11px;background:#fff;display:grid;place-items:center;font-size:15px}
    .message.user .msg-avatar{background:var(--purple);font-size:9px;font-weight:900}
    .bubble{max-width:76%;border:1px solid var(--line);border-radius:17px;border-top-left-radius:5px;background:#fff;padding:12px 14px;font-size:11px;line-height:1.75}
    .message.user .bubble{background:var(--ink);color:#fff;border-color:var(--ink);border-radius:17px 5px 17px 17px;white-space:pre-wrap}
    .bubble p{margin:0 0 7px}.bubble p:last-child{margin:0}
    .bubble img{display:block;max-width:230px;max-height:170px;object-fit:cover;border-radius:11px;margin-bottom:8px}
    .high-risk{padding:9px 10px;margin-bottom:8px;border:1px solid var(--red);border-radius:11px;background:#ffe3e4;color:#a52b31;font-weight:900}
    .map-entry{margin-top:8px;border:0;border-radius:999px;background:var(--red);color:#fff;padding:8px 11px;font-size:9px;font-weight:800}
    .composer{padding:12px 22px 17px;border-top:1px solid var(--line)}
    .composer-inner{width:min(760px,100%);margin:auto;display:flex;align-items:end;gap:7px}
    .composer textarea{flex:1;resize:none;border:1px solid var(--line);border-radius:15px;background:#fff;padding:11px 12px;outline:0}
    .composer textarea:focus{border-color:var(--purple)}
    .toast{position:fixed;z-index:130;left:50%;bottom:25px;transform:translateX(-50%);background:var(--ink);color:#fff;border-radius:999px;padding:10px 15px;font-size:10px}

    @media(max-width:760px){
      .video-login{min-height:560px}.topbar{height:76px;padding:0 16px}.brand{font-size:18px}.brand-mark{width:32px;height:32px}.top-note{display:none}.btn{padding:10px 13px;font-size:10px}.bottombar{left:16px;right:16px;bottom:18px}.bottom-copy{padding:10px 12px}.bottom-copy span{display:none}
      .app{grid-template-columns:1fr;padding:7px}.sidebar{position:fixed;z-index:60;inset:7px auto 7px 7px;width:270px;transform:translateX(-110%);transition:.22s}.sidebar.open{transform:none}.workspace{border-radius:20px}.menu{display:block}.appbar{padding:0 14px}.pets{padding:11px 14px 4px}.welcome{padding:15px}.welcome h1{font-size:47px}.messages{padding:18px 12px}.composer{padding:10px 12px 13px}.bubble{max-width:86%}
    }
  </style>
</head>
<body>
  <section class="screen active" id="landing">
    <main class="video-login">
      <video class="hero-video" id="heroVideo" autoplay muted loop playsinline>
        <source src="./jimeng-2026-07-02-8438-使用两张参考图中的四只小动物作为唯一主体角色，包括白色雪貂_小鼬、灰色龙猫、橘白....mp4" type="video/mp4">
      </video>
      <header class="topbar">
        <div class="brand display"><span class="brand-mark">🐾</span>MochiCare</div>
        <div class="top-note">AI care for very small friends</div>
        <div class="top-actions">
          <button class="btn btn-login" onclick="App.openAuth()">登录</button>
          <button class="btn btn-start" onclick="App.openAuth()">开始提问&nbsp; ↗</button>
        </div>
      </header>
      <footer class="bottombar">
        <div class="bottom-copy">
          <span class="status-dot"></span>
          <div><b>全天候异宠养护助手</b><span>日常问答 · 风险提醒 · 附近医院</span></div>
        </div>
        <div class="video-tools"><button class="video-tool" id="playBtn" onclick="App.toggleVideo()" aria-label="暂停或播放">Ⅱ</button></div>
      </footer>
    </main>
  </section>

  <section class="screen" id="inside">
    <div class="app">
      <aside class="sidebar" id="sidebar">
        <div class="side-brand display"><span class="brand-mark">🐾</span>MochiCare</div>
        <div class="profile">
          <div class="avatar">异</div>
          <div class="profile-text"><b>异宠用户</b><span id="userPhone">188****0000</span></div>
          <span>›</span>
        </div>
        <button class="new-chat" onclick="App.newChat()">＋ 新对话</button>
        <div class="side-label">Recent chats</div>
        <div class="history" id="history"></div>
        <div class="side-foot">
          <button class="side-link" onclick="App.openMap('manual')">📍 资源地图</button>
          <button class="side-link" onclick="App.goHome()">↙ 返回登录页</button>
        </div>
      </aside>

      <main class="workspace">
        <header class="appbar">
          <div style="display:flex;align-items:center;gap:8px"><button class="menu" onclick="App.toggleSidebar()">☰</button><span class="app-title">MOCHI AI / 异宠养护助手</span></div>
          <div class="app-actions"><button class="outline-btn" onclick="App.openMap('manual')">附近医院&nbsp; ↗</button></div>
        </header>
        <div class="pets" id="pets"></div>

        <section class="welcome" id="welcome">
          <div class="welcome-inner">
            <div class="welcome-mark">🐾</div>
            <h1 class="display">今天想问<br><span>什么小问题？</span></h1>
            <p id="welcomeText">喂食、环境、行为，或它最近不太寻常的小变化。</p>
            <div class="ask">
              <textarea id="heroInput" rows="2" placeholder="比如：我家雪貂最近老掉毛，还特别爱咬东西…"></textarea>
              <div class="ask-foot"><button class="round" onclick="App.pickImage()" title="上传图片">⌁</button><button class="send" onclick="App.send('hero')">发送&nbsp; ↑</button></div>
            </div>
            <div class="suggestions" id="suggestions"></div>
          </div>
        </section>

        <section class="chat" id="chat">
          <div class="messages" id="messages"><div class="messages-inner" id="messagesInner"></div></div>
          <div class="composer">
            <div class="composer-inner"><button class="round" onclick="App.pickImage()">⌁</button><textarea id="chatInput" rows="1" placeholder="继续追问…"></textarea><button class="send" onclick="App.send('chat')">发送&nbsp; ↑</button></div>
          </div>
        </section>
      </main>
    </div>
  </section>

  <div id="modalMount"></div>
  <div id="toastMount"></div>

  <script>
    const $=s=>document.querySelector(s);
    const esc=s=>String(s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
    const SPECIES=[["雪貂","🦦"],["龙猫","🐭"],["兔兔","🐰"],["蜜袋鼯","🐿️"],["其他","🐾"]];
    const SUGGEST=["雪貂一天喂几次？","笼子和垫材怎么选？","最近老掉毛，还爱咬东西","突然抽搐，叫不醒"];
    const EMERGENCY=["抽搐","痉挛","出血","流血","呼吸困难","昏迷","瘫痪","中毒","持续呕吐","休克"];
    const ANOMALY=["掉毛","脱毛","变瘦","亢奋","爱咬","嗜睡","发抖","无力"];
    const VETS=[
      ["毛球动物医院 · 中心店","0.8 km","示例市元气路 18 号","010-00000000"],
      ["24H 小动物急诊","2.3 km","示例市月光大道 66 号","010-11111111"],
      ["奇妙异宠诊所","3.6 km","示例市森林街 5 号","010-22222222"]
    ];
    const state={phone:"188****0000",pets:[],selected:0,chats:[],active:null,streaming:false,prompted:false,pendingImage:null};
    let seed=1;
    const uid=()=>`id${seed++}`;
    function answerFor(text){
      if(EMERGENCY.some(k=>text.includes(k)))return{high:true,text:"**请立即就医**\n你描述的情况可能属于紧急状况，请尽快带它前往能接诊异宠的宠物医院。\n\n出发前请保持安静和温暖，不要强行喂食或自行用药；如果方便，记录症状开始时间并拍下短视频。\n\n本回答为 AI 辅助参考，不替代执业兽医诊断。"};
      if(ANOMALY.some(k=>text.includes(k)))return{high:false,text:"这些变化值得留意。对雪貂来说，掉毛和异常亢奋有时可能与季节换毛、压力或肾上腺相关问题有关，不能只凭一条描述判断。\n\n建议记录掉毛位置、持续时间、食欲与体重变化；若出现对称性脱毛或持续加重，请预约能看异宠的兽医。"};
      return{high:false,text:"可以先从饮食、环境温湿度和近期活动量三个方面检查。\n\n如果你愿意，可以继续告诉我它的品种、年龄和具体表现，我会帮你把建议缩小到更实用的范围。"};
    }
    const App={
      show(id){document.querySelectorAll(".screen").forEach(x=>x.classList.remove("active"));$(id).classList.add("active")},
      toggleVideo(){const v=$("#heroVideo"),b=$("#playBtn");if(v.paused){v.play();b.textContent="Ⅱ"}else{v.pause();b.textContent="▶"}},
      openAuth(){
        $("#modalMount").innerHTML=`<div class="modal-mask" onclick="if(event.target===this)App.closeModal()"><div class="modal">
          <div class="modal-head"><h2 class="display">Welcome back.</h2><button class="close" onclick="App.closeModal()">×</button></div>
          <div class="modal-body"><p class="modal-lead">登录后，Mochi 才能记住你和小家伙的档案。未注册手机号会自动创建账号。</p>
          <div class="field"><label>手机号</label><input id="phone" class="input" value="18800000000" maxlength="11" inputmode="numeric"></div>
          <div class="field"><label>验证码</label><div class="row"><input id="code" class="input" placeholder="输入 000000" maxlength="6" inputmode="numeric"><button class="code" onclick="App.sendCode(this)">获取验证码</button></div></div>
          <div class="form-hint">演示验证码：000000</div><div id="authError" class="form-error hidden"></div>
          <button class="btn modal-submit" onclick="App.login()">进入 MochiCare&nbsp; ↗</button></div></div></div>`;
        setTimeout(()=>$("#code").focus(),60);
      },
      sendCode(btn){btn.textContent="已发送 · 60s";btn.disabled=true;this.toast("验证码已发送 · 000000")},
      login(){
        const phone=$("#phone").value.trim(),code=$("#code").value.trim();
        if(!/^1[3-9]\d{9}$/.test(phone)||code!=="000000"){const e=$("#authError");e.classList.remove("hidden");e.textContent="请输入有效手机号和演示验证码 000000";return}
        state.phone=phone.slice(0,3)+"****"+phone.slice(7);$("#userPhone").textContent=state.phone;this.closeModal();this.show("#inside");this.renderAll();
        if(!state.prompted){state.prompted=true;setTimeout(()=>this.openPet(true),240)}
      },
      goHome(){this.closeSidebar();this.show("#landing")},
      closeModal(){$("#modalMount").innerHTML=""},
      openPet(first=false){
        if(state.pets.length>=5){this.toast("暂时最多支持 5 只宠物");return}
        $("#modalMount").innerHTML=`<div class="modal-mask" onclick="if(event.target===this)App.closeModal()"><div class="modal">
          <div class="modal-head"><h2 class="display">${first?"认识一下小家伙":"添加小伙伴"}</h2><button class="skip" onclick="App.closeModal()">${first?"暂不填写":"关闭"}</button></div>
          <div class="modal-body"><p class="modal-lead">填一次，之后提问会自动带上它的背景信息。</p>
          <div class="field"><label>昵称</label><input id="petName" class="input" placeholder="比如：十一"></div>
          <div class="field"><label>品种</label><div class="chips" id="species">${SPECIES.map((s,i)=>`<button class="chip ${i===0?"on":""}" data-name="${s[0]}" data-icon="${s[1]}" onclick="App.pickChip(this)">${s[1]} ${s[0]}</button>`).join("")}</div></div>
          <div class="field"><label>年龄（可选）</label><input id="petAge" class="input" placeholder="比如：8 个月"></div>
          <div class="field"><label>性别</label><div class="chips" id="sex"><button class="chip on" data-value="未知" onclick="App.pickChip(this)">未知</button><button class="chip" data-value="公" onclick="App.pickChip(this)">公</button><button class="chip" data-value="母" onclick="App.pickChip(this)">母</button></div></div>
          <div id="petError" class="form-error hidden"></div><button class="btn btn-start modal-submit" onclick="App.savePet()">保存宠物档案&nbsp; 🐾</button></div></div></div>`;
      },
      pickChip(el){el.parentElement.querySelectorAll(".chip").forEach(x=>x.classList.remove("on"));el.classList.add("on")},
      savePet(){
        const name=$("#petName").value.trim();if(!name){$("#petError").classList.remove("hidden");$("#petError").textContent="请先填写昵称";return}
        const sp=$("#species .on"),sex=$("#sex .on");state.pets.push({name,species:sp.dataset.name,icon:sp.dataset.icon,age:$("#petAge").value.trim()||"年龄未知",sex:sex.dataset.value});state.selected=state.pets.length-1;this.closeModal();this.renderPets();this.toast(`${name} 的档案保存好了`)
      },
      renderAll(){this.renderPets();this.renderHistory();this.renderSuggestions();this.renderMessages();this.updateView()},
      renderPets(){
        $("#pets").innerHTML=state.pets.map((p,i)=>`<button class="pet ${i===state.selected?"on":""}" onclick="App.selectPet(${i})"><span class="pet-icon">${p.icon}</span><span><b>${esc(p.name)}</b><small>${esc(p.species)} · ${esc(p.age)}</small></span></button>`).join("")+`<button class="add-pet" onclick="App.openPet()">＋</button>`;
        $("#welcomeText").textContent=state.pets.length?`已带上「${state.pets[state.selected].name}」的档案，直接描述问题就好。`:"喂食、环境、行为，或它最近不太寻常的小变化。";
      },
      selectPet(i){state.selected=i;this.renderPets();const p=state.pets[i],input=this.current()?.messages.length?$("#chatInput"):$("#heroInput");input.placeholder=`问问关于 ${p.name}（${p.species}）的问题…`;input.focus()},
      renderSuggestions(){$("#suggestions").innerHTML=SUGGEST.map(q=>`<button class="suggest" onclick="App.send('hero','${q}')">${q}</button>`).join("")},
      current(){return state.chats.find(c=>c.id===state.active)},
      newChat(){state.active=null;state.pendingImage=null;this.renderAll();this.renderPreview();this.closeSidebar();$("#heroInput").value="";setTimeout(()=>$("#heroInput").focus(),40)},
      openChat(id){state.active=id;this.renderAll();this.closeSidebar()},
      renderHistory(){$("#history").innerHTML=state.chats.length?state.chats.map(c=>`<div class="history-item ${c.id===state.active?"on":""}" onclick="App.openChat('${c.id}')">${esc(c.title)}</div>`).join(""):`<div class="history-item" style="opacity:.5">还没有对话</div>`},
      updateView(){const started=this.current()?.messages.length;$("#welcome").classList.toggle("hidden",!!started);$("#chat").classList.toggle("show",!!started)},
      send(where,preset){
        if(state.streaming)return;const input=where==="hero"?$("#heroInput"):$("#chatInput"),text=String(preset??input.value).trim();if(!text&&!state.pendingImage)return;
        let chat=this.current();if(!chat){chat={id:uid(),title:text.slice(0,22)||"图片提问",messages:[]};state.chats.unshift(chat);state.active=chat.id}
        const pet=state.pets[state.selected],context=pet?`[${pet.name} · ${pet.species} · ${pet.age} · ${pet.sex}] `:"";
        chat.messages.push({role:"user",text:text||"请帮我看看这张图片",context,image:state.pendingImage});input.value="";state.pendingImage=null;this.renderPreview();this.renderHistory();this.updateView();this.renderMessages();
        const result=answerFor(text||"图片"),msg={role:"ai",text:"",high:result.high,typing:true};chat.messages.push(msg);state.streaming=true;let i=0;
        const timer=setInterval(()=>{i=Math.min(result.text.length,i+4);msg.text=result.text.slice(0,i);this.renderMessages();if(i>=result.text.length){clearInterval(timer);msg.typing=false;state.streaming=false;this.renderMessages();if(result.high)setTimeout(()=>this.openMap("high"),380)}},18);
      },
      renderMessages(){
        const chat=this.current();if(!chat){$("#messagesInner").innerHTML="";return}
        $("#messagesInner").innerHTML=chat.messages.map(m=>{
          if(m.role==="user")return`<div class="message user"><div class="msg-avatar">我</div><div class="bubble">${m.image?`<img src="${m.image}" alt="用户上传图片">`:""}${m.context?`<span style="display:block;color:#b9aaff;font-size:8px;margin-bottom:4px">${esc(m.context)}</span>`:""}${esc(m.text)}</div></div>`;
          const body=m.text.split("\n").map(line=>{const safe=esc(line).replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>");return/请立即就医/.test(line)?`<div class="high-risk">${safe}</div>`:`<p>${safe||"&nbsp;"}</p>`}).join("");
          return`<div class="message ai"><div class="msg-avatar">🐾</div><div class="bubble">${body}${m.high?`<button class="map-entry" onclick="App.openMap('high')">📍 查看附近医院</button>`:""}</div></div>`;
        }).join("");const box=$("#messages");box.scrollTop=box.scrollHeight;
      },
      pickImage(){
        const input=document.createElement("input");input.type="file";input.accept="image/jpeg,image/png,image/webp";input.onchange=()=>{const f=input.files?.[0];if(!f)return;if(f.size>10*1024*1024){this.toast("图片不能超过 10MB");return}state.pendingImage=URL.createObjectURL(f);this.renderPreview();this.toast("图片已添加")};input.click();
      },
      renderPreview(){document.querySelectorAll(".preview").forEach(x=>x.remove());if(!state.pendingImage)return;const html=`<div class="preview"><img src="${state.pendingImage}" alt="待发送图片"><span>图片已准备好</span><button onclick="App.clearImage()">移除</button></div>`;$(".ask-foot")?.insertAdjacentHTML("beforebegin",html);$(".composer-inner")?.insertAdjacentHTML("beforebegin",html)},
      clearImage(){state.pendingImage=null;this.renderPreview()},
      openMap(source){
        $("#modalMount").innerHTML=`<div class="modal-mask" onclick="if(event.target===this)App.closeModal()"><div class="modal"><div class="modal-head"><h2 class="display">附近医院</h2><button class="close" onclick="App.closeModal()">×</button></div><div class="modal-body">${source==="high"?`<div class="risk-note"><b>检测到高危描述</b><br>请优先联系医院并尽快出发。</div>`:""}<p class="modal-lead" style="margin-top:13px">以下为演示数据。出发前请电话确认能否接诊异宠。</p>${VETS.map(v=>`<div class="vet"><div class="vet-name"><span>${v[0]}</span><span>${v[1]}</span></div><p>${v[2]}</p><a href="tel:${v[3]}">致电 ${v[3]} ↗</a></div>`).join("")}</div></div></div>`;
      },
      toggleSidebar(){$("#sidebar").classList.toggle("open")},
      closeSidebar(){$("#sidebar").classList.remove("open")},
      toast(text){$("#toastMount").innerHTML=`<div class="toast">${esc(text)}</div>`;clearTimeout(this.toastTimer);this.toastTimer=setTimeout(()=>$("#toastMount").innerHTML="",2100)}
    };
    document.addEventListener("keydown",e=>{if(e.key==="Escape")App.closeModal();if(e.key==="Enter"&&!e.shiftKey){if(document.activeElement?.id==="heroInput"){e.preventDefault();App.send("hero")}if(document.activeElement?.id==="chatInput"){e.preventDefault();App.send("chat")}}});
    window.addEventListener("load",()=>App.renderSuggestions());
  </script>
</body>
</html>
